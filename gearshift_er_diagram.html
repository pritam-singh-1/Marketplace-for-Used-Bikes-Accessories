
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efea',
    primaryBorderColor: dark ? '#4a4a46' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    edgeLabelBackground: dark ? '#1e1e1c' : '#ffffff',
  },
});

const diagram = `erDiagram
  USERS {
    int id PK
    varchar username UK
    varchar email UK
    varchar password
    varchar full_name
    varchar phone
    varchar location
    text bio
    float rating
    int reviews_count
    tinyint is_verified
    timestamp joined
  }
  LISTINGS {
    int id PK
    int seller_id FK
    varchar title
    varchar category
    varchar brand
    varchar model
    int year
    varchar condition
    float price
    tinyint negotiable
    text description
    varchar frame_size
    varchar color
    int mileage
    varchar location
    text service_history
    text images
    varchar status
    int views
    timestamp created_at
  }
  OFFERS {
    int id PK
    int listing_id FK
    int buyer_id FK
    int seller_id FK
    float amount
    text message
    varchar status
    timestamp created_at
  }
  MESSAGES {
    int id PK
    int sender_id FK
    int receiver_id FK
    int listing_id FK
    text content
    tinyint is_read
    timestamp created_at
  }
  ORDERS {
    int id PK
    int listing_id FK
    int buyer_id FK
    int seller_id FK
    float amount
    varchar status
    varchar method
    varchar tx_id
    timestamp created_at
  }
  SERVICE_BOOKINGS {
    int id PK
    int user_id FK
    int mechanic_id FK
    text bike_info
    varchar package
    varchar scheduled_date
    varchar status
    float cost
    text notes
    timestamp created_at
  }
  MECHANICS {
    int id PK
    varchar name
    varchar specialization
    int experience
    float rating
    tinyint available
    text bio
  }
  FAVORITES {
    int id PK
    int user_id FK
    int listing_id FK
    timestamp created_at
  }
  REVIEWS {
    int id PK
    int reviewer_id FK
    int reviewed_id FK
    int listing_id FK
    int rating
    text comment
    timestamp created_at
  }

  USERS ||--o{ LISTINGS : "sells"
  USERS ||--o{ OFFERS : "makes"
  USERS ||--o{ FAVORITES : "saves"
  USERS ||--o{ REVIEWS : "writes"
  USERS ||--o{ SERVICE_BOOKINGS : "books"
  USERS ||--o{ MESSAGES : "sends"
  USERS ||--o{ ORDERS : "buys"
  LISTINGS ||--o{ OFFERS : "receives"
  LISTINGS ||--o{ FAVORITES : "saved in"
  LISTINGS ||--o{ MESSAGES : "about"
  LISTINGS ||--o{ ORDERS : "purchased as"
  LISTINGS ||--o{ REVIEWS : "reviewed in"
  MECHANICS ||--o{ SERVICE_BOOKINGS : "assigned to"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
